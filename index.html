.met{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:10px}
.mc{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px}
.mc .lb{font-size:10px;color:var(--text2);margin-bottom:3px}
.mc .vl{font-size:18px;font-weight:700}

.cb{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:10px}
.cr{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}

.tw{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:10px;overflow-x:auto;max-height:280px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:#1e293b;color:var(--text);padding:7px 8px;text-align:center;position:sticky;top:0;z-index:1}
td{padding:5px 8px;text-align:center;border-bottom:1px solid var(--border)}
tr:hover td{background:#1e293b}
.buy{color:var(--green);font-weight:600}.sell{color:var(--red);font-weight:600}
.st{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;padding-left:4px}

function calcATR(highs,lows,closes,p){const tr=[];for(let i=0;i<closes.length;i++){if(i===0){tr.push(highs[i]-lows[i]);continue}
tr.push(Math.max(highs[i]-lows[i],Math.abs(highs[i]-closes[i-1]),Math.abs(lows[i]-closes[i-1])))}
const a=[];for(let i=0;i<tr.length;i++){if(i<p-1){a.push(null);continue}let s=0;for(let j=i-p+1;j<=i;j++)s+=tr[j];a.push(s/p)}return{tr,atr:a}}

function turtle(op,hi,lo,cl,ep,xp,atrP,atrM,dates){
  const n=cl.length,atrData=calcATR(hi,lo,cl,atrP).atr;
  const eH=[],xL=[];
  for(let i=0;i<n;i++){if(i<ep){eH.push(null)}else{let mx=-Infinity;for(let j=i-ep;j<i;j++)mx=Math.max(mx,hi[j]);eH.push(mx)}
  if(i<xp){xL.push(null)}else{let mn=Infinity;for(let j=i-xp;j<i;j++)mn=Math.min(mn,lo[j]);xL.push(mn)}}
  let cap=CAP,sh=0,pos=0,entryP=0,stopP=0;const nv=[],trades=[];
  for(let i=0;i<n;i++){if(eH[i]==null||atrData[i]==null){nv.push((cap+sh*cl[i])/CAP);continue}
  if(pos===0&&cl[i]>eH[i]){const maxSh=Math.floor(cap/cl[i]);const u=Math.max(1,Math.min(maxSh,Math.floor(cap*0.01/atrData[i])));sh=u;entryP=cl[i];stopP=entryP-atrM*atrData[i];cap-=sh*entryP;pos=1;
  trades.push({date:dates[i],action:'买入',price:cl[i],shares:sh,reason:'突破'+ep+'日高点'})}
  else if(pos===1){if(cl[i]<xL[i]){cap+=sh*cl[i];trades.push({date:dates[i],action:'卖出(通道)',price:cl[i],shares:sh,reason:'跌破'+xp+'日低点'});sh=0;pos=0}

  nv.push((cap+sh*cl[i])/CAP)}

  const mr2=dr.reduce((a,b)=>a+b,0)/dr.length,sd2=Math.sqrt(dr.reduce((a,b)=>a+(b-mr2)**2,0)/(dr.length-1));
  const ar2=(1+sr)**(252/n)-1,av2=sd2*Math.sqrt(252),sh2=av2>0?(ar2-RF)/av2:0;
  const tc=r.trades.filter(t=>t.action.includes('卖出')).length;
  const cs=sr>=0?'style="color:#22c55e"':'style="color:#ef4444"';
  h+='<tr><td>'+name+'</td><td>'+ep+'/'+xp+'/'+am+'x</td><td '+cs+'>'+(sr*100).toFixed(2)+'%</td><td>'+(bhr*100).toFixed(2)+'%</td><td>'+mdd.toFixed(2)+'%</td><td>'+sh2.toFixed(3)+'</td><td>'+tc+'</td></tr>'})});
  h+='</tbody>';$('cmp').innerHTML=h;
}

window.addEventListener('resize',()=>{['main','vol','nav','dd'].forEach(id=>{const c=echarts.getInstanceByDom($(id));if(c)c.resize()})});
run();
</script></body></html>
